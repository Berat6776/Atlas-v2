<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Icon Generator</title></head>
<body>
<p style="font-family:sans-serif;padding:20px">İkonlar oluşturuluyor... Lütfen bekleyin.</p>
<canvas id="c"></canvas>
<script>
const svgSrc = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0b0b12"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#d4a843" stroke-width="6" stroke-dasharray="12 6" opacity="0.35"/>
  <circle cx="256" cy="256" r="148" fill="none" stroke="#d4a843" stroke-width="2" opacity="0.2"/>
  <line x1="256" y1="80" x2="256" y2="432" stroke="#d4a843" stroke-width="1.5" opacity="0.15"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#d4a843" stroke-width="1.5" opacity="0.15"/>
  <polygon points="256,108 244,156 256,148 268,156" fill="#d4a843" opacity="0.9"/>
  <polygon points="256,404 244,356 256,364 268,356" fill="#d4a843" opacity="0.4"/>
  <polygon points="404,256 356,244 364,256 356,268" fill="#d4a843" opacity="0.4"/>
  <polygon points="108,256 156,244 148,256 156,268" fill="#d4a843" opacity="0.4"/>
  <path d="M256,168 C226,168 202,192 202,222 C202,262 256,328 256,328 C256,328 310,262 310,222 C310,192 286,168 256,168 Z" fill="#d4a843" opacity="0.95"/>
  <circle cx="256" cy="220" r="20" fill="#0b0b12"/>
  <circle cx="256" cy="256" r="6" fill="#d4a843" opacity="0.6"/>
  <circle cx="150" cy="145" r="2.5" fill="#d4a843" opacity="0.5"/>
  <circle cx="370" cy="130" r="1.8" fill="#d4a843" opacity="0.4"/>
  <circle cx="390" cy="370" r="2.2" fill="#d4a843" opacity="0.45"/>
  <circle cx="130" cy="360" r="1.5" fill="#d4a843" opacity="0.35"/>
</svg>`;

const blob = new Blob([svgSrc], {type:'image/svg+xml'});
const url = URL.createObjectURL(blob);
const img = new Image();
img.onload = () => {
  [192, 512].forEach(size => {
    const c = document.getElementById('c');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    ctx.clearRect(0,0,size,size);
    ctx.drawImage(img, 0, 0, size, size);
    const a = document.createElement('a');
    a.download = `icon-${size}.png`;
    a.href = c.toDataURL('image/png');
    a.textContent = `icon-${size}.png indir`;
    a.style.cssText = 'display:block;margin:10px 20px;font-family:sans-serif;font-size:18px;color:#d4a843';
    document.body.appendChild(a);
    a.click();
  });
  document.querySelector('p').textContent = '✅ İkonlar indirildi! Bu dosyaları atlas-pwa klasörüne koyun.';
  URL.revokeObjectURL(url);
};
img.src = url;
</script>
</body>
</html>
