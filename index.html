<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ATLAS">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#d4a843">
<meta name="description" content="Kişisel evren haritası ve not defteri">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>ATLAS — Evren Haritası</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --void:       #06060a;
  --deep:       #0b0b12;
  --surface:    #10101a;
  --raised:     #161622;
  --hover:      #1c1c2c;
  --rim:        rgba(255,255,255,.06);
  --rim-hi:     rgba(255,255,255,.14);
  --t1:         #e9e7f2;
  --t2:         rgba(233,231,242,.58);
  --t3:         rgba(233,231,242,.30);
  --gold:       #d4a843;
  --gold-g:     rgba(212,168,67,.18);
  --gold-d:     rgba(212,168,67,.55);
  --blue:       #7090d0;
  --blue-g:     rgba(112,144,208,.18);
  --red:        #c06060;
  --red-g:      rgba(192,96,96,.18);
  --ease-out:   cubic-bezier(.16,1,.3,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --r-sm:10px;--r-md:14px;--r-lg:22px;--r-xl:30px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--void);color:var(--t1);
  font-family:'Crimson Pro',Georgia,serif;
  -webkit-font-smoothing:antialiased;
}

/* ── MAP ─────────────────────────────────────────── */
#map{width:100%;height:100%;background:var(--void);}
.leaflet-container{background:var(--void)!important;}
.leaflet-control-zoom,.leaflet-control-attribution{display:none!important;}
#map.add-mode{cursor:crosshair;}

/* ── STARFIELD ───────────────────────────────────── */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── UPLOAD SCREEN ───────────────────────────────── */
#upload-screen{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:36px;
  padding:48px 28px;z-index:1000;
}
.logo{display:flex;flex-direction:column;align-items:center;gap:14px;}
.logo-ring{
  width:80px;height:80px;border-radius:50%;
  border:1.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:34px;
  box-shadow:0 0 48px var(--gold-g),inset 0 0 24px var(--gold-g);
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 48px var(--gold-g),inset 0 0 24px var(--gold-g);}
  50%{box-shadow:0 0 80px rgba(212,168,67,.3),inset 0 0 40px rgba(212,168,67,.12);}
}
.logo h1{
  font-family:'Cinzel',serif;font-size:36px;font-weight:700;
  letter-spacing:.25em;color:var(--gold);
}
.logo p{font-size:15px;color:var(--t3);letter-spacing:.1em;font-weight:300;}

#upload-btn{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  background:linear-gradient(135deg,var(--raised),var(--surface));
  border:1.5px dashed var(--rim-hi);border-radius:var(--r-xl);
  padding:44px 56px;cursor:pointer;width:100%;max-width:320px;
  transition:all .3s var(--ease-out);position:relative;overflow:hidden;
}
#upload-btn::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(212,168,67,.06),transparent 70%);
  pointer-events:none;
}
#upload-btn:active{border-color:var(--gold);background:var(--hover);box-shadow:0 0 40px var(--gold-g);}
#upload-btn .u-icon{font-size:44px;filter:drop-shadow(0 4px 12px rgba(212,168,67,.4));}
#upload-btn .u-title{font-family:'Cinzel',serif;font-size:17px;font-weight:600;color:var(--t1);letter-spacing:.05em;}
#upload-btn .u-sub{font-size:13px;color:var(--t3);}
#map-file-input{display:none;}

/* ── TOP BAR ─────────────────────────────────────── */
#top-bar{
  position:fixed;top:0;left:0;right:0;
  display:none;align-items:center;justify-content:space-between;
  padding:14px 18px;
  padding-top:max(14px,env(safe-area-inset-top,14px));
  background:linear-gradient(to bottom,rgba(6,6,10,.96),transparent);
  z-index:500;
}
.brand{
  font-family:'Cinzel',serif;font-size:17px;font-weight:600;
  color:var(--gold);letter-spacing:.2em;text-shadow:0 0 24px var(--gold-g);
}
#change-map-btn{
  background:rgba(11,11,18,.85);border:1px solid var(--rim-hi);
  border-radius:var(--r-md);color:var(--t2);font-family:'Crimson Pro',serif;
  font-size:14px;padding:9px 15px;cursor:pointer;
  backdrop-filter:blur(16px);transition:all .25s var(--ease-out);
}
#change-map-btn:active{background:var(--raised);color:var(--t1);}

/* ── FAB ─────────────────────────────────────────── */
#fab{
  position:fixed;right:22px;
  bottom:max(36px,calc(env(safe-area-inset-bottom,0px) + 22px));
  width:62px;height:62px;border-radius:50%;
  background:var(--gold);color:#000;font-size:26px;
  display:none;align-items:center;justify-content:center;
  border:none;cursor:pointer;z-index:500;
  box-shadow:0 6px 28px rgba(212,168,67,.55),0 2px 8px rgba(0,0,0,.6);
  transition:all .35s var(--ease-spring);
}
#fab.active{
  background:var(--red);font-size:22px;font-weight:700;
  box-shadow:0 6px 28px rgba(192,96,96,.55),0 2px 8px rgba(0,0,0,.6);
}
#fab:active{transform:scale(.91);}
#fab.active:active{transform:scale(.91);}

/* ── ADD MODE BANNER ─────────────────────────────── */
#add-hint{
  position:fixed;
  top:max(72px,calc(env(safe-area-inset-top,0px) + 64px));
  left:50%;transform:translateX(-50%) translateY(-8px);
  background:rgba(192,96,96,.12);border:1px solid rgba(192,96,96,.45);
  border-radius:var(--r-lg);padding:11px 22px;
  font-size:14px;color:#e07070;z-index:500;
  opacity:0;pointer-events:none;letter-spacing:.03em;
  transition:all .3s var(--ease-out);white-space:nowrap;
}
#add-hint.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── PIN COUNT ───────────────────────────────────── */
#pin-count{
  position:fixed;left:18px;
  bottom:max(44px,calc(env(safe-area-inset-bottom,0px) + 30px));
  display:none;align-items:center;gap:7px;
  background:rgba(11,11,18,.82);border:1px solid var(--rim-hi);
  border-radius:var(--r-md);padding:9px 14px;
  font-family:'Cinzel',serif;font-size:11px;color:var(--t3);
  letter-spacing:.1em;backdrop-filter:blur(16px);z-index:500;
}
.count-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold-d);}

/* ── CUSTOM MARKER ───────────────────────────────── */
.cm{display:flex;align-items:center;justify-content:center;width:36px;height:36px;}
.mp{
  width:26px;height:26px;border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  background:var(--gold);border:2px solid rgba(255,255,255,.25);
  box-shadow:0 3px 18px rgba(212,168,67,.65);
  transition:all .25s var(--ease-spring);
}
.mp.sel{
  background:var(--blue);box-shadow:0 3px 22px rgba(112,144,208,.8);
  transform:rotate(-45deg) scale(1.25);
}

/* ── BACKDROP ────────────────────────────────────── */
#backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:750;
  opacity:0;pointer-events:none;transition:opacity .35s ease;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
#backdrop.on{opacity:1;pointer-events:all;}

/* ── BOTTOM SHEET ────────────────────────────────── */
#sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  border-top:1px solid var(--rim);
  box-shadow:0 -4px 80px rgba(0,0,0,.9);
  z-index:800;
  transform:translateY(102%);
  transition:transform .42s var(--ease-out);
  max-height:92dvh;display:flex;flex-direction:column;
  padding-bottom:max(20px,env(safe-area-inset-bottom,20px));
}
#sheet.on{transform:translateY(0);}
.s-handle{width:38px;height:4px;background:var(--rim-hi);border-radius:2px;margin:14px auto 0;flex-shrink:0;}
.s-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 6px;flex-shrink:0;}
.s-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.14em;color:var(--t3);text-transform:uppercase;}
.s-x{
  width:34px;height:34px;border-radius:50%;background:var(--raised);
  border:1px solid var(--rim);color:var(--t2);font-size:16px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s ease;
}
.s-x:active{background:var(--hover);}
.s-body{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:10px 20px 24px;display:flex;flex-direction:column;gap:18px;
  -webkit-overflow-scrolling:touch;
}
.s-body::-webkit-scrollbar{width:3px;}
.s-body::-webkit-scrollbar-thumb{background:var(--rim-hi);border-radius:2px;}

/* ── FIELDS ──────────────────────────────────────── */
.fg{display:flex;flex-direction:column;gap:8px;}
.fl{font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;}
.fi{
  background:var(--deep);border:1.5px solid var(--rim);
  border-radius:var(--r-md);color:var(--t1);
  font-family:'Crimson Pro',serif;font-size:18px;
  padding:14px 16px;width:100%;outline:none;
  transition:all .25s var(--ease-out);-webkit-appearance:none;appearance:none;
}
.fi:focus{border-color:var(--gold-d);background:var(--void);box-shadow:0 0 0 3px var(--gold-g);}
.fi::placeholder{color:var(--t3);}
textarea.fi{resize:none;min-height:130px;line-height:1.65;font-size:16px;}

/* ── IMAGE PICKER ────────────────────────────────── */
.ipick input[type=file]{display:none;}
.ipick-btn{
  display:flex;align-items:center;gap:14px;
  background:var(--deep);border:1.5px dashed var(--rim-hi);
  border-radius:var(--r-md);padding:14px 16px;cursor:pointer;
  transition:all .25s var(--ease-out);width:100%;
}
.ipick-btn:active{background:var(--raised);border-color:var(--blue);}
.ipick-btn .ii{font-size:24px;}
.ipick-btn .it span{display:block;font-size:15px;color:var(--t2);}
.ipick-btn .it small{font-size:12px;color:var(--t3);}
#pin-img-prev{
  width:100%;border-radius:var(--r-md);max-height:190px;
  object-fit:cover;border:1px solid var(--rim);display:none;
  animation:fadeIn .3s ease;
}
#pin-img-prev.on{display:block;}
@keyframes fadeIn{from{opacity:0;transform:scale(.97);}to{opacity:1;transform:scale(1);}}

/* ── SHEET ACTIONS ───────────────────────────────── */
.s-actions{display:flex;gap:10px;padding:0 20px 6px;flex-shrink:0;}
.btn{
  flex:1;padding:16px;border-radius:var(--r-md);border:none;
  font-family:'Cinzel',serif;font-size:12.5px;font-weight:600;
  letter-spacing:.1em;cursor:pointer;
  transition:all .25s var(--ease-spring);-webkit-tap-highlight-color:transparent;
}
.btn-save{background:var(--gold);color:#000;}
.btn-save:active{transform:scale(.96);background:var(--gold-d);}
.btn-del{
  background:var(--raised);color:var(--red);
  border:1px solid rgba(192,96,96,.28);flex:0 0 auto;width:80px;
}
.btn-del:active{transform:scale(.96);background:var(--red-g);}

/* ── TOAST ───────────────────────────────────────── */
#toast{
  position:fixed;
  top:max(80px,calc(env(safe-area-inset-top,0px) + 70px));
  left:50%;transform:translateX(-50%) translateY(-12px);
  background:var(--raised);border:1px solid var(--rim-hi);
  border-radius:var(--r-lg);padding:12px 22px;
  font-size:14px;color:var(--t1);z-index:950;
  opacity:0;pointer-events:none;
  transition:all .3s var(--ease-out);white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.7);
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── INSTALL BANNER ──────────────────────────────── */
#install-banner{
  position:fixed;bottom:max(120px,calc(env(safe-area-inset-bottom,0px)+110px));
  left:16px;right:16px;
  background:linear-gradient(135deg,var(--raised),var(--hover));
  border:1px solid var(--gold-d);border-radius:var(--r-lg);
  padding:16px 18px;z-index:600;
  display:none;align-items:center;gap:14px;
  box-shadow:0 8px 40px rgba(0,0,0,.7),0 0 24px var(--gold-g);
  animation:slideUp .4s var(--ease-out);
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
#install-banner .ib-icon{font-size:28px;flex-shrink:0;}
#install-banner .ib-text{flex:1;}
#install-banner .ib-text strong{display:block;font-family:'Cinzel',serif;font-size:13px;color:var(--t1);letter-spacing:.06em;}
#install-banner .ib-text small{font-size:12px;color:var(--t3);}
#install-banner .ib-btns{display:flex;flex-direction:column;gap:7px;flex-shrink:0;}
#btn-install{
  background:var(--gold);color:#000;border:none;
  border-radius:var(--r-sm);padding:9px 14px;
  font-family:'Cinzel',serif;font-size:11px;font-weight:700;
  letter-spacing:.06em;cursor:pointer;white-space:nowrap;
}
#btn-install:active{opacity:.85;}
#btn-dismiss{
  background:transparent;color:var(--t3);border:none;
  font-size:12px;cursor:pointer;text-align:center;padding:2px;
}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="map"></div>

<!-- Upload Screen -->
<div id="upload-screen">
  <div class="logo">
    <div class="logo-ring">🗺️</div>
    <h1>ATLAS</h1>
    <p>Evren Haritası &amp; Not Defteri</p>
  </div>
  <label id="upload-btn" for="map-file-input">
    <span class="u-icon">🖼️</span>
    <span class="u-title">Galeriden Harita Yükle</span>
    <span class="u-sub">PNG · JPG · WEBP · GIF</span>
  </label>
  <input type="file" id="map-file-input" accept="image/*">
</div>

<!-- Top Bar -->
<div id="top-bar">
  <span class="brand">ATLAS</span>
  <button id="change-map-btn">🖼️ Değiştir</button>
</div>

<!-- Add Mode Banner -->
<div id="add-hint">✦ Haritada bir noktaya dokun</div>

<!-- FAB -->
<button id="fab" aria-label="İşaret ekle">📍</button>

<!-- Pin Count -->
<div id="pin-count"><span class="count-dot"></span><span id="pin-num">0 işaret</span></div>

<!-- Install Banner -->
<div id="install-banner">
  <span class="ib-icon">📲</span>
  <div class="ib-text">
    <strong>Uygulamayı Yükle</strong>
    <small>Ana ekrana ekle, offline çalışır</small>
  </div>
  <div class="ib-btns">
    <button id="btn-install">Yükle</button>
    <button id="btn-dismiss">Kapat</button>
  </div>
</div>

<!-- Backdrop -->
<div id="backdrop"></div>

<!-- Bottom Sheet -->
<div id="sheet" role="dialog" aria-modal="true">
  <div class="s-handle"></div>
  <div class="s-head">
    <span class="s-label" id="s-label">İşaret Detayı</span>
    <button class="s-x" id="s-x" aria-label="Kapat">✕</button>
  </div>
  <div class="s-body">
    <div class="fg">
      <label class="fl" for="p-title">Başlık</label>
      <input type="text" id="p-title" class="fi" placeholder="Bu noktanın adı…" autocomplete="off">
    </div>
    <div class="fg">
      <label class="fl" for="p-notes">Notlar &amp; Lore</label>
      <textarea id="p-notes" class="fi" placeholder="Bu yere dair hikayeler, sırlar, gizli bilgiler…"></textarea>
    </div>
    <div class="fg">
      <label class="fl">Görsel (isteğe bağlı)</label>
      <div class="ipick">
        <label class="ipick-btn" for="p-img">
          <span class="ii">📸</span>
          <span class="it">
            <span>Galeriden Görsel Seç</span>
            <small>Bu konuma özel bir görüntü</small>
          </span>
        </label>
        <input type="file" id="p-img" accept="image/*">
        <img id="pin-img-prev" alt="Konum görseli">
      </div>
    </div>
  </div>
  <div class="s-actions">
    <button class="btn btn-del" id="b-del">🗑️</button>
    <button class="btn btn-save" id="b-save">Kaydet</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Change map hidden input -->
<input type="file" id="change-input" accept="image/*" style="display:none">

<script>
// ─── STARFIELD ────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('stars');
  const ctx=c.getContext('2d');
  let stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;makeStars();}
  function makeStars(){
    stars=[];
    const n=Math.floor((c.width*c.height)/3200);
    for(let i=0;i<n;i++)
      stars.push({x:Math.random()*c.width,y:Math.random()*c.height,
        r:Math.random()*1.2+.2,a:Math.random()*.6+.1,da:(Math.random()-.5)*.004});
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a+=s.da;if(s.a<.05||s.a>.7)s.da*=-1;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,215,240,${s.a})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  addEventListener('resize',resize);resize();draw();
})();

// ─── SERVICE WORKER ───────────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(()=>console.log('[ATLAS] SW registered'))
      .catch(e=>console.warn('[ATLAS] SW failed:',e));
  });
}

// ─── PWA INSTALL ─────────────────────────────────────────────────────
let deferredPrompt=null;
const installBanner=document.getElementById('install-banner');
const btnInstall=document.getElementById('btn-install');
const btnDismiss=document.getElementById('btn-dismiss');

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  setTimeout(()=>{installBanner.style.display='flex';},3000);
});

btnInstall.addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
  installBanner.style.display='none';
  if(outcome==='accepted')toast('✦ ATLAS yükleniyor!');
});

btnDismiss.addEventListener('click',()=>{installBanner.style.display='none';});

window.addEventListener('appinstalled',()=>{
  installBanner.style.display='none';
  toast('🎉 ATLAS ana ekrana eklendi!');
});

// ─── CONSTANTS ────────────────────────────────────────────────────────
const SK='atlas_v2';

// ─── STATE ────────────────────────────────────────────────────────────
let map=null,addMode=false;
let pins={};
let curId=null,isNew=false,tmpMkr=null,pendingImg=null;

// ─── DOM ──────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const US=$('upload-screen'),MFI=$('map-file-input'),CI=$('change-input');
const TB=$('top-bar'),CMB=$('change-map-btn');
const FAB=$('fab'),AH=$('add-hint'),PC=$('pin-count'),PN=$('pin-num');
const BD=$('backdrop'),SH=$('sheet'),SX=$('s-x');
const SLBL=$('s-label'),PT=$('p-title'),PNT=$('p-notes');
const PIMG=$('p-img'),PREV=$('pin-img-prev');
const BSAVE=$('b-save'),BDEL=$('b-del'),TOASTEL=$('toast');

// ─── STORAGE ──────────────────────────────────────────────────────────
function persisted(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}}
function persist(){
  const data={};
  Object.values(pins).forEach(p=>{data[p.id]={id:p.id,lat:p.lat,lng:p.lng,title:p.title,notes:p.notes,img:p.img||null};});
  try{localStorage.setItem(SK,JSON.stringify({pins:data}));}
  catch{toast('⚠️ Depolama doldu! Büyük görselleri silin.');}
}
function saveMapB64(b64){try{localStorage.setItem(SK+'_map',b64);}catch{toast('⚠️ Harita resmi çok büyük kaydedilemedi.');}}
function loadMapB64(){return localStorage.getItem(SK+'_map');}

// ─── HELPERS ──────────────────────────────────────────────────────────
function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);});}
function imgDims(src){return new Promise(res=>{const i=new Image();i.onload=()=>res({w:i.width,h:i.height});i.src=src;});}

// ─── TOAST ────────────────────────────────────────────────────────────
let toastT;
function toast(msg,dur=2600){TOASTEL.textContent=msg;TOASTEL.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>TOASTEL.classList.remove('on'),dur);}

// ─── MAP ──────────────────────────────────────────────────────────────
async function initMap(b64){
  if(map){map.remove();map=null;}
  pins={};curId=null;
  const{w,h}=await imgDims(b64);
  map=L.map('map',{
    crs:L.CRS.Simple,minZoom:-4,maxZoom:6,
    zoomControl:false,attributionControl:false,
    tap:true,tapTolerance:20,touchZoom:true,dragging:true,
    inertia:true,inertiaDeceleration:2800,inertiaMaxSpeed:2000,maxBoundsViscosity:.75,
  });
  L.imageOverlay(b64,[[0,0],[h,w]]).addTo(map);
  map.fitBounds([[0,0],[h,w]]);
  map.setMaxBounds([[-h*.35,-w*.35],[h*1.35,w*1.35]]);
  map.on('click',e=>{if(!addMode)return;setAddMode(false);openNewSheet(e.latlng.lat,e.latlng.lng);});
  const saved=persisted();
  if(saved&&saved.pins)Object.values(saved.pins).forEach(p=>placePin(p.id,p.lat,p.lng,p.title,p.notes,p.img,false));
  updateCount();
}

// ─── MARKERS ──────────────────────────────────────────────────────────
function mkrIcon(sel){return L.divIcon({className:'cm',html:`<div class="mp${sel?' sel':''}"></div>`,iconAnchor:[13,26],iconSize:[26,26]});}
function placePin(id,lat,lng,title,notes,img,doSave){
  const mkr=L.marker([lat,lng],{icon:mkrIcon(false)}).addTo(map);
  mkr.on('click',()=>openExistSheet(id));
  pins[id]={id,lat,lng,title:title||'',notes:notes||'',img:img||null,marker:mkr};
  if(doSave)persist();
  updateCount();
}
function updateCount(){const n=Object.keys(pins).length;PN.textContent=n===0?'0 işaret':`${n} işaret`;}

// ─── ADD MODE ─────────────────────────────────────────────────────────
function setAddMode(on){
  addMode=on;
  if(on){FAB.classList.add('active');FAB.textContent='✕';AH.classList.add('on');}
  else{FAB.classList.remove('active');FAB.textContent='📍';AH.classList.remove('on');}
}
FAB.addEventListener('click',()=>{if(!map){toast('⚠️ Önce harita yükleyin');return;}setAddMode(!addMode);});

// ─── SHEET ────────────────────────────────────────────────────────────
function openSheet(){SH.classList.add('on');BD.classList.add('on');}
function closeSheet(){
  SH.classList.remove('on');BD.classList.remove('on');
  if(curId&&pins[curId])pins[curId].marker.setIcon(mkrIcon(false));
  if(isNew&&tmpMkr){map.removeLayer(tmpMkr);tmpMkr=null;delete pins[curId];}
  curId=null;isNew=false;pendingImg=null;
  PREV.classList.remove('on');PREV.src='';PT.value='';PNT.value='';PIMG.value='';
}
SX.addEventListener('click',closeSheet);
BD.addEventListener('click',closeSheet);

// Swipe-down to close
let sy=0;
SH.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;},{passive:true});
SH.addEventListener('touchmove',e=>{if(e.touches[0].clientY-sy>60&&!SH.querySelector('.s-body').scrollTop)closeSheet();},{passive:true});

function openNewSheet(lat,lng){
  isNew=true;curId='pin_'+Date.now();
  PT.value='';PNT.value='';pendingImg=null;
  PREV.classList.remove('on');PREV.src='';
  SLBL.textContent='Yeni İşaret';
  tmpMkr=L.marker([lat,lng],{icon:mkrIcon(true)}).addTo(map);
  pins[curId]={id:curId,lat,lng,title:'',notes:'',img:null,marker:tmpMkr};
  openSheet();setTimeout(()=>PT.focus(),450);
}

function openExistSheet(id){
  isNew=false;curId=id;const p=pins[id];
  PT.value=p.title||'';PNT.value=p.notes||'';pendingImg=p.img||null;
  SLBL.textContent='İşaret Detayı';
  if(p.img){PREV.src=p.img;PREV.classList.add('on');}
  else{PREV.classList.remove('on');PREV.src='';}
  p.marker.setIcon(mkrIcon(true));
  openSheet();
}

// ─── PIN IMAGE ────────────────────────────────────────────────────────
PIMG.addEventListener('change',async e=>{
  const f=e.target.files[0];if(!f)return;
  try{pendingImg=await toB64(f);PREV.src=pendingImg;PREV.classList.add('on');}
  catch{toast('❌ Görsel yüklenemedi');}
});

// ─── SAVE ─────────────────────────────────────────────────────────────
BSAVE.addEventListener('click',()=>{
  const title=PT.value.trim(),notes=PNT.value.trim(),id=curId;
  if(!id)return;
  if(isNew){
    const p=pins[id];p.title=title;p.notes=notes;p.img=pendingImg;
    map.removeLayer(p.marker);
    const mkr=L.marker([p.lat,p.lng],{icon:mkrIcon(false)}).addTo(map);
    mkr.on('click',()=>openExistSheet(id));
    p.marker=mkr;tmpMkr=null;isNew=false;
  }else{
    pins[id].title=title;pins[id].notes=notes;pins[id].img=pendingImg;
    pins[id].marker.setIcon(mkrIcon(false));
  }
  persist();updateCount();toast('✦ Kaydedildi');
  curId=null;pendingImg=null;
  SH.classList.remove('on');BD.classList.remove('on');
  PREV.classList.remove('on');PREV.src='';
});

// ─── DELETE ───────────────────────────────────────────────────────────
BDEL.addEventListener('click',()=>{
  if(!curId)return;const id=curId;
  if(pins[id]){map.removeLayer(pins[id].marker);delete pins[id];}
  persist();updateCount();toast('🗑️ İşaret silindi');
  curId=null;isNew=false;tmpMkr=null;
  SH.classList.remove('on');BD.classList.remove('on');
});

// ─── MAP UPLOAD ───────────────────────────────────────────────────────
async function handleMapFile(file){
  if(!file)return;
  toast('⏳ Yükleniyor…',4000);
  try{
    const b64=await toB64(file);
    saveMapB64(b64);
    US.style.display='none';
    TB.style.display='flex';FAB.style.display='flex';PC.style.display='flex';
    await initMap(b64);
    toast('✦ Harita hazır!');
  }catch{toast('❌ Dosya yüklenemedi');}
}
MFI.addEventListener('change',e=>handleMapFile(e.target.files[0]));
CI.addEventListener('change',e=>handleMapFile(e.target.files[0]));
CMB.addEventListener('click',()=>CI.click());

// ─── INIT ─────────────────────────────────────────────────────────────
(async()=>{
  const saved=loadMapB64();
  if(saved){
    try{
      US.style.display='none';
      TB.style.display='flex';FAB.style.display='flex';PC.style.display='flex';
      await initMap(saved);
    }catch{localStorage.removeItem(SK+'_map');}
  }
})();
</script>
